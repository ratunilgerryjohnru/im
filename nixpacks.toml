[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_pgsql", "composer"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs --no-interaction"]

[phases.build]
cmds = ["cp .env.example .env", "php artisan key:generate", "php artisan storage:link"]

[phases.start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"