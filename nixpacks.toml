[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_pgsql", "php84Extensions.pdo_mysql", "composer"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-interaction"]

[phases.build]
cmds = ["cp .env.example .env", "php artisan key:generate", "php artisan storage:link"]

[phases.start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"